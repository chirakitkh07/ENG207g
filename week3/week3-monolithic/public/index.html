<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Task Board</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-layer-group"></i>
                <h2>TaskFlow</h2>
            </div>
            
            <div class="create-task-section">
                <h3><i class="fa-solid fa-plus-circle"></i> New Task</h3>
                <form id="task-form">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="title" placeholder="What needs to be done?" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <textarea id="description" placeholder="Add details..." rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <div class="custom-select-wrapper">
                            <select id="priority">
                                <option value="LOW">Low Priority</option>
                                <option value="MEDIUM" selected>Medium Priority</option>
                                <option value="HIGH">High Priority</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Create Task</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>
            
            <div class="filter-section">
                <h3><i class="fa-solid fa-filter"></i> Filters</h3>
                <div class="custom-select-wrapper">
                    <select id="filter-status">
                        <option value="ALL">All Tasks</option>
                        <option value="TODO">To Do</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="DONE">Done</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon"></i>
                </div>
            </div>
            
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="greeting">
                    <h1>My Board</h1>
                    <p>Track and manage your tasks beautifully.</p>
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User">
                </div>
            </header>

            <div class="board-container">
                <!-- TODO Column -->
                <div class="kanban-column column-todo">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="status-dot dot-todo"></span>
                            <h2>To Do</h2>
                        </div>
                        <span class="task-count" id="count-todo">0</span>
                    </div>
                    <div class="kanban-cards" id="col-todo">
                        <!-- Cards injected here -->
                    </div>
                </div>

                <!-- IN PROGRESS Column -->
                <div class="kanban-column column-inprogress">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="status-dot dot-inprogress"></span>
                            <h2>In Progress</h2>
                        </div>
                        <span class="task-count" id="count-in-progress">0</span>
                    </div>
                    <div class="kanban-cards" id="col-in-progress">
                        <!-- Cards injected here -->
                    </div>
                </div>

                <!-- DONE Column -->
                <div class="kanban-column column-done">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="status-dot dot-done"></span>
                            <h2>Done</h2>
                        </div>
                        <span class="task-count" id="count-done">0</span>
                    </div>
                    <div class="kanban-cards" id="col-done">
                        <!-- Cards injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
